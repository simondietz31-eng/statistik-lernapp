<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernapp</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">

<body>

<header class="app-header">
  <button id="btn-home" class="brand" type="button">🎓 Lernapp</button>
  <button id="btn-theme-toggle" class="icon-btn" type="button" aria-label="Dark Mode umschalten">🌓</button>
</header>

<main id="app">

  <section id="view-studiengang-select" class="view">
    <h1 class="subject-title">Willkommen! Wähle deinen Studiengang</h1>
    <div id="studiengaenge-container"></div>
  </section>

  <section id="view-subject-select" class="view" hidden>
    <button class="back-btn" data-back-to="STUDIENGANG_SELECT" type="button">← Studiengänge</button>
    <h1 id="studiengang-title" class="subject-title"></h1>
    <div id="subjects-container"></div>
  </section>

  <section id="view-topic-grid" class="view" hidden>
    <button class="back-btn" data-back-to="SUBJECT_SELECT" type="button">← Fächer</button>
    <h1 id="subject-title" class="subject-title"></h1>
    <div id="chapters-container"></div>
  </section>

  <section id="view-explanation" class="view" hidden>
    <button class="back-btn" data-back-to="TOPIC_GRID" type="button">← Themenübersicht</button>
    <h2 id="explanation-title"></h2>
    <div id="explanation-content" class="content-blocks"></div>
    <div class="action-row">
      <button id="btn-go-exercises" class="primary-btn" type="button">📝 Übungsaufgaben</button>
      <button id="btn-go-quiz" class="primary-btn" type="button">🎯 Quiz starten</button>
    </div>
  </section>

  <section id="view-exercises" class="view" hidden>
    <button class="back-btn" data-back-to="EXPLANATION" type="button">← Zurück zum Thema</button>
    <h2 id="exercises-title"></h2>
    <div id="exercises-content"></div>
    <div class="action-row">
      <button id="btn-exercises-to-quiz" class="primary-btn" type="button">🎯 Quiz starten</button>
    </div>
  </section>

  <section id="view-quiz" class="view" hidden>
    <button class="back-btn" data-back-to="EXPLANATION" type="button">← Zurück zum Thema</button>
    <h2 id="quiz-title"></h2>
    <div id="quiz-progress" class="quiz-progress"></div>
    <div id="quiz-content"></div>
  </section>

  <section id="view-quiz-summary" class="view" hidden>
    <div id="quiz-summary-content" class="quiz-summary"></div>
  </section>

</main>

<footer class="app-footer">
  <button id="btn-export-progress" type="button" class="footer-link-btn">Fortschritt exportieren</button>
  <span aria-hidden="true"> · </span>
  <button id="btn-import-progress" type="button" class="footer-link-btn">Fortschritt importieren</button>
  <span aria-hidden="true"> · </span>
  <button id="btn-reset-progress" type="button" class="footer-link-btn">Fortschritt zurücksetzen</button>
  <input id="import-file-input" type="file" accept="application/json" hidden>
</footer>
